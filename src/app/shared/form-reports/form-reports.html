<div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
  <div
    class="bg-gradient-to-r from-gray-50 to-white px-8 py-6 border-b border-gray-100 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-[#f3592c] rounded-xl flex items-center justify-center shadow-lg shadow-orange-100">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4">
          </path>
        </svg>
      </div>
      <div>
        <h2 class="text-xl font-extrabold text-gray-800 tracking-tight">
          {{ isEnrolled() ? 'Panel de Inscripciones' : 'Panel de Pagos' }}
        </h2>
        <p class="text-xs text-gray-500 font-medium uppercase tracking-widest">Configuración de Filtros</p>
      </div>
    </div>
  </div>

  <form [formGroup]="filterForm" (ngSubmit)="save()" class="p-8 space-y-8">

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 xl:gap-8 items-start">

      @if(isEnrolled()){
      <div class="space-y-4 lg:col-span-8 xl:col-span-7">
        <label class="flex items-center gap-2 text-sm font-bold text-gray-700 uppercase tracking-wider">
          <span class="w-1.5 h-1.5 bg-[#f3592c] rounded-full"></span>
          Clase Específica
        </label>
        <div class="relative group">
          <select formControlName="courseName"
            class="w-full bg-gray-50 border-2 border-transparent focus:border-[#f3592c] focus:bg-white rounded-2xl px-5 py-3.5 text-gray-700 outline-none transition-all duration-300 appearance-none shadow-sm group-hover:shadow-md">
            <option value="" disabled selected>Seleccionar curso de la lista...</option>
            @for (clase of classes(); track clase.id) {
            <option [value]="clase.id">{{ clase.name }}</option>
            }
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="space-y-4 lg:col-span-4 xl:col-span-5">
        <label class="flex items-center gap-2 text-sm font-bold text-gray-700 uppercase tracking-wider">
          <span class="w-1.5 h-1.5 bg-[#4ecdc4] rounded-full"></span>
          Sede / Ubicación
        </label>
        <select formControlName="location"
          class="w-full bg-gray-50 border-2 border-transparent focus:border-[#4ecdc4] focus:bg-white rounded-2xl px-5 py-3.5 text-gray-700 outline-none transition-all duration-300 shadow-sm hover:shadow-md h-[58px]">
          <option value="" disabled selected>Cualquier sede</option>
          <option value="Social Club">Social Club</option>
          <option value="Ritmo Vivo">Ritmo Vivo</option>
        </select>
      </div>
      }

      <div class="bg-orange-50/30 rounded-3xl p-6 border border-orange-100 space-y-4 lg:col-span-8 xl:col-span-7">
        <label class="flex items-center gap-2 text-sm font-bold text-orange-700 uppercase tracking-wider">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          Periodo de Compra
        </label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="relative">
            <span class="absolute left-4 top-1 text-[10px] font-bold text-orange-400 uppercase">Desde</span>
            <input formControlName="purchaseDateStart" type="date"
              class="w-full bg-white border-2 border-orange-100 focus:border-[#f3592c] rounded-xl px-4 pt-5 pb-2 text-gray-700 outline-none transition-all shadow-sm">
          </div>
          <div class="relative">
            <span class="absolute left-4 top-1 text-[10px] font-bold text-orange-400 uppercase">Hasta</span>
            <input formControlName="purchaseDateEnd" type="date"
              class="w-full bg-white border-2 border-orange-100 focus:border-[#f3592c] rounded-xl px-4 pt-5 pb-2 text-gray-700 outline-none transition-all shadow-sm">
          </div>
        </div>
      </div>

      @if(!isEnrolled()){
      <div
        class="bg-emerald-50/30 rounded-3xl p-6 border border-emerald-100 space-y-4 lg:col-span-4 xl:col-span-5 h-full">
        <label class="flex items-center gap-2 text-sm font-bold text-emerald-700 uppercase tracking-wider">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round"></path>
          </svg>
          Horario Específico
        </label>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-4">
          <input formControlName="timeStart" type="time"
            class="w-full bg-white border-2 border-emerald-100 focus:border-[#4ecdc4] rounded-xl px-4 py-3 text-gray-700 outline-none transition-all shadow-sm">
          <input formControlName="timeEnd" type="time"
            class="w-full bg-white border-2 border-emerald-100 focus:border-[#4ecdc4] rounded-xl px-4 py-3 text-gray-700 outline-none transition-all shadow-sm">
        </div>
      </div>
      }
    </div>

    <div class="flex flex-col sm:flex-row justify-end items-center gap-4 pt-6">
      <button (click)="clearForm()" type="button"
        class="w-full sm:w-auto px-8 py-3.5 text-gray-500 font-bold hover:text-gray-800 transition-colors cursor-pointer">
        Restablecer
      </button>
      <button type="submit" [disabled]="!filterForm.dirty"
        class="w-full sm:w-auto px-10 py-3.5 bg-gradient-to-r from-[#f3592c] to-[#ff7a54] text-white rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-orange-200 hover:scale-105 active:scale-95 disabled:opacity-30 disabled:grayscale disabled:scale-100 transition-all duration-300">
        Aplicar Filtros
      </button>
    </div>
  </form>
</div>
